name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint & format
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build CLI
        run: pnpm build:cli

      - name: Smoke test — CLI runs
        run: node dist/cli.js --version

      - name: Smoke test — CLI help
        run: node dist/cli.js --help

      - name: Package dry-run
        run: npm pack --dry-run
