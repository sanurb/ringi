name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ matrix.node-version }}
          cache: true

      - run: vp install

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint & format
        run: vp check

      - name: Test
        run: vp test run

      - name: Build CLI
        run: pnpm --filter @sanurb/ringi build

      - name: Smoke test — CLI runs
        run: node apps/cli/dist/cli.mjs --version

      - name: Smoke test — CLI help
        run: node apps/cli/dist/cli.mjs --help

      - name: Package dry-run
        run: cd apps/cli && npm pack --dry-run
