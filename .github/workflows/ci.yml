name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# ──────────────────────────────────────────────────────────────────────────
# Run this workflow locally with agent-ci:
#   npx agent-ci run --workflow .github/workflows/ci.yml --no-matrix
#
# On failure, fix the issue and retry:
#   npx agent-ci retry --name <runner-name>
# ──────────────────────────────────────────────────────────────────────────

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint & format
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build CLI
        run: pnpm --filter @sanurb/ringi build

      - name: Build Web
        run: pnpm build

      - name: Copy server assets to CLI
        run: pnpm --filter @sanurb/ringi build:server

      - name: Smoke test — CLI runs
        run: node apps/cli/dist/cli.mjs --version

      - name: Smoke test — CLI help
        run: node apps/cli/dist/cli.mjs --help

      - name: Smoke test — verify packed artifact
        run: node apps/cli/scripts/verify-package.mjs

      - name: Package dry-run
        run: pnpm --filter @sanurb/ringi pack --pack-destination /tmp
